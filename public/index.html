<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }
        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .todo-container{
            background:white;
            width:420px;
            padding:25px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
        }
        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }
        form{
            display:flex;
            gap:8px;
            margin-bottom:20px;
        }
        input{
            flex:1;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }
        button{
            padding:12px 20px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }
        button:hover{
            background:#0056b3;
        }
        ul{
            list-style:none;
            min-height:300px;
        }
        li{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px;
            margin-bottom:8px;
            background:#f9f9f9;
            border-radius:6px;
            transition:0.3s;
        }
        li.checked .task-text{
            text-decoration:line-through;
            color:gray;
        }
        .task-left{
            display:flex;
            align-items:center;
            gap:12px;
        }
        .actions{
            display:flex;
            gap:6px;
        }
        .edit-btn{
            background:orange;
            padding:6px 12px;
            font-size:14px;
        }
        .delete-btn{
            background:red;
            padding:6px 12px;
            font-size:14px;
        }
        .counter{
            margin-top:20px;
            text-align:center;
            font-weight:bold;
            color:#555;
        }
    </style>
</head>
<body>
<div class="todo-container">
    <h2>Advanced To-Do List</h2>
    <form id="todo-form">
        <input type="text" id="todo-input" placeholder="Add a new task..." autofocus>
        <button type="submit">Add</button>
    </form>
    <ul id="todo-list"></ul>
    <div class="counter">
        Total: <span id="total-count">0</span> | 
        Completed: <span id="completed-count">0</span>
    </div>
</div>

<script>
    const API_URL = '/api/tasks';
    const form = document.getElementById("todo-form");
    const input = document.getElementById("todo-input");
    const list = document.getElementById("todo-list");
    const totalCount = document.getElementById("total-count");
    const completedCount = document.getElementById("completed-count");

    let tasks = [];

    // Load tasks from server
    async function loadTasks() {
        try {
            const res = await fetch(API_URL);
            tasks = await res.json();
            renderTasks();
        } catch (err) {
            console.error("Failed to load tasks", err);
        }
    }

    // Save tasks to server
    async function saveTasks() {
        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(tasks)
            });
        } catch (err) {
            console.error("Failed to save tasks", err);
        }
    }

    function renderTasks() {
        list.innerHTML = '';
        tasks.forEach((task, index) => {
            const li = document.createElement("li");
            if (task.done) li.classList.add("checked");

            li.innerHTML = `
                <div class="task-left">
                    <input type="checkbox" class="check-task" ${task.done ? 'checked' : ''}>
                    <span class="task-text">${task.text}</span>
                </div>
                <div class="actions">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>
            `;

            // Checkbox
            li.querySelector(".check-task").addEventListener("change", () => {
                tasks[index].done = !tasks[index].done;
                saveTasks();
                renderTasks();
            });

            // Delete
            li.querySelector(".delete-btn").addEventListener("click", () => {
                tasks.splice(index, 1);
                saveTasks();
                renderTasks();
            });

            // Edit
            li.querySelector(".edit-btn").addEventListener("click", () => {
                const newText = prompt("Edit task:", tasks[index].text);
                if (newText !== null && newText.trim() !== "") {
                    tasks[index].text = newText.trim();
                    saveTasks();
                    renderTasks();
                }
            });

            list.appendChild(li);
        });
        updateCounters();
    }

    function updateCounters() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.done).length;
        totalCount.textContent = total;
        completedCount.textContent = completed;
    }

    // Add new task
    form.addEventListener("submit", async function(e) {
        e.preventDefault();
        const text = input.value.trim();
        if (text === "") {
            alert("Please enter a task");
            return;
        }

        tasks.push({ text: text, done: false });
        await saveTasks();
        renderTasks();
        input.value = "";
    });

    // Initialize
    loadTasks();
</script>
</body>
</html>
